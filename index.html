<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Build Up!</title>
    <script src="phaser.min.js"></script>
    <style>
      body { 
        margin: 0; 
        padding: 0; 
        background-color: rgb(0,0,0); 
        overflow: hidden; 
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <script>
      const config = {
        type: Phaser.AUTO,
        width: window.innerWidth,
        height: window.innerHeight,
        scene: {
          create: create
        }
      };
    
      const game = new Phaser.Game(config);
    
      function create() {
    
        const width = this.scale.width;
        const height = this.scale.height;
    
        // 背景A（赤）
        let background = this.add.rectangle(0, 0, width, height, 0xff0000)
          .setOrigin(0);
    
        // ボタンA（黄色）
        let buttonA = this.add.rectangle(width / 2 - 100, height / 2, 150, 80, 0xffff00)
          .setInteractive();
    
        // ボタンB（オレンジ）
        let buttonB = this.add.rectangle(width / 2 + 100, height / 2, 150, 80, 0xffa500)
          .setInteractive();
    
        function switchToB() {
          // 背景を青に変更
          background.setFillStyle(0x0000ff);
    
          // ボタンを削除
          buttonA.destroy();
          buttonB.destroy();
        }
    
        buttonA.on('pointerdown', switchToB);
        buttonB.on('pointerdown', switchToB);
      }
    </script>
  </body>
</html>
